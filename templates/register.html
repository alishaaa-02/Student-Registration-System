<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="floating-circle"></div>
    <div class="floating-circle2"></div>
<div class="hero">

    <nav class="navbar">
        <h2>🎓 StudentSys</h2>
        <a href="/" class="nav-btn">Home</a>
    </nav>

    <div class="form-section">

        <div class="form-box">
            <h1>Register Student</h1>
            <p>Fill student details below</p>

            <form action="/register" method="POST">

                <input type="text" name="name" placeholder="Full Name" required>

                <input type="email" name="email" placeholder="Email Address" required>

                <input type="text" name="phone" placeholder="Phone Number" required>

                <input type="text" name="course" placeholder="Course Name" required>

                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

                <input type="date" name="dob" required>

                <textarea name="address" rows="4" placeholder="Address"></textarea>

                <button type="submit" class="btn">Register Student</button>

            </form>
        </div>

    </div>

</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
