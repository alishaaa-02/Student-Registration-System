<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="floating-circle"></div>
    <div class="floating-circle2"></div>

    <div class="hero">

        <nav class="navbar">
            <h2>🎓 StudentSys</h2>
            <a href="/students" class="nav-btn">Dashboard</a>
        </nav>

        <div class="form-section">

            <div class="form-box">
                <h1>Edit Student</h1>
                <p>Update student details</p>

                <form action="/update/{{ student[0] }}" method="POST">

                    <input type="text" name="name" value="{{ student[1] }}" placeholder="Full Name" required>

                    <input type="email" name="email" value="{{ student[2] }}" placeholder="Email Address" required>

                    <input type="text" name="phone" value="{{ student[3] }}" placeholder="Phone Number" required>

                    <input type="text" name="course" value="{{ student[4] }}" placeholder="Course Name" required>

                    <select name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male" {% if student[5]=='Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if student[5]=='Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if student[5]=='Other' %}selected{% endif %}>Other</option>
                    </select>

                    <input type="date" name="dob" value="{{ student[6] }}" required>

                    <textarea name="address" rows="4" placeholder="Address">{{ student[7] }}</textarea>

                    <button type="submit" class="btn">Update Student</button>

                </form>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
